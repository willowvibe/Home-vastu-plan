name: Deploy Collaboration Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build server
        run: cd server && npm run build

      - name: Deploy to Render
        uses: render-com/deploy@v1
        with:
          serviceId: ${{ secrets.RENDER_SERVICE_ID }}
          apiKey: ${{ secrets.RENDER_API_KEY }}
          region: us-east-1

      - name: Deploy to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: |
          curl -X POST https://api.railway.app/deploy \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main", "projectId": "${{ secrets.RAILWAY_PROJECT_ID }}"}'

      - name: Verify deployment
        run: |
          echo "Server deployment initiated"
          echo "Check deployment status at https://dashboard.render.com"
